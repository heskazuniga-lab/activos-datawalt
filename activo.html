<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datawalt — Activo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 0 40px;
  }

  /* Header */
  .top-bar {
    width: 100%;
    background: #111;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .top-logo { color: #fff; font-size: 16px; font-weight: 900; letter-spacing: 3px; }
  .top-sub { color: #888; font-size: 11px; letter-spacing: 1px; }

  /* Card */
  .card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    margin: 0 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .card-header {
    background: #111;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-code { color: #fff; font-size: 28px; font-weight: 900; letter-spacing: 1px; }
  .card-badge {
    background: #fff; color: #111;
    font-size: 10px; font-weight: 800;
    padding: 4px 10px; border-radius: 4px;
    letter-spacing: 1px;
  }

  .card-device {
    padding: 16px 20px 0;
    border-bottom: 1px solid #f0f0f0;
    padding-bottom: 16px;
  }
  .card-brand { font-size: 18px; font-weight: 700; color: #111; }
  .card-model { font-size: 13px; color: #666; margin-top: 3px; }

  .card-rows { padding: 4px 0; }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 20px;
    border-bottom: 1px solid #f5f5f5;
  }
  .row:last-child { border-bottom: none; }
  .row-label { font-size: 13px; color: #999; }
  .row-val { font-size: 13px; font-weight: 600; color: #111; text-align: right; max-width: 60%; }

  .status-pill {
    display: inline-block;
    font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
  }
  .status-op    { background: #d4edda; color: #1a6b2e; }
  .status-no    { background: #f8d7da; color: #842029; }
  .status-rep   { background: #fff3cd; color: #856404; }
  .status-other { background: #e2e3e5; color: #41464b; }

  .card-footer {
    margin: 0 20px 20px;
  }
  .btn-sheets {
    display: block;
    width: 100%;
    background: #111;
    color: #fff;
    text-align: center;
    padding: 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.3px;
  }
  .btn-sheets:hover { background: #333; }

  /* Loading / Error */
  .state-box {
    width: 100%; max-width: 420px;
    margin: 0 16px;
    background: #fff;
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #eee;
    border-top-color: #111;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-title { font-size: 16px; font-weight: 700; color: #111; margin-bottom: 6px; }
  .state-sub { font-size: 13px; color: #888; }

  .powered {
    margin-top: 24px;
    font-size: 11px;
    color: #bbb;
    text-align: center;
  }
</style>
</head>
<body>

<div class="top-bar">
  <span class="top-logo">DTW</span>
  <span class="top-sub">INVENTARIO</span>
</div>

<div id="app"></div>
<p class="powered">Datawalt · Sistema de activos</p>

<script>
const SHEET_ID = '1GkMCYbgpEnSr_UZgQFNsdDKYTFCqXKi5';
const GID      = '710926643';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit#gid=${GID}`;

// Lee el parámetro ?id=COMP-004 de la URL
function getParam(key) {
  return new URLSearchParams(window.location.search).get(key);
}

function statusClass(s) {
  if (!s) return 'status-other';
  const v = s.toLowerCase();
  if (v.includes('operativo') && !v.includes('no')) return 'status-op';
  if (v.includes('no operativo')) return 'status-no';
  if (v.includes('reparaci')) return 'status-rep';
  return 'status-other';
}

function renderLoading() {
  document.getElementById('app').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">Cargando activo...</div>
      <div class="state-sub">Consultando inventario Datawalt</div>
    </div>`;
}

function renderError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="state-box">
      <div class="state-title">Activo no encontrado</div>
      <div class="state-sub">${msg}</div>
    </div>`;
}

function renderAsset(a) {
  const badge   = a.tipo === 'Computador' ? 'COMP' : 'MON';
  const stClass = statusClass(a.estado);
  const rowUrl  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit#gid=${GID}&range=A${a._row}`;

  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="card-code">${a.codigo}</span>
        <span class="card-badge">${badge}</span>
      </div>
      <div class="card-device">
        <div class="card-brand">${a.marca}</div>
        <div class="card-model">${a.modelo}</div>
      </div>
      <div class="card-rows">
        <div class="row">
          <span class="row-label">Estado</span>
          <span class="status-pill ${stClass}">${a.estado || '—'}</span>
        </div>
        <div class="row">
          <span class="row-label">Responsable</span>
          <span class="row-val">${a.responsable || 'Libre'}</span>
        </div>
        <div class="row">
          <span class="row-label">Área</span>
          <span class="row-val">${a.departamento || '—'}</span>
        </div>
        <div class="row">
          <span class="row-label">ID colaborador</span>
          <span class="row-val">${a.id || '—'}</span>
        </div>
        ${a.observaciones ? `
        <div class="row">
          <span class="row-label">Observaciones</span>
          <span class="row-val">${a.observaciones}</span>
        </div>` : ''}
      </div>
      <div class="card-footer">
        <a class="btn-sheets" href="${rowUrl}" target="_blank">Ver registro completo →</a>
      </div>
    </div>`;
}

async function loadAsset(codigo) {
  // Google Sheets JSON export (público de lectura)
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;
  const res  = await fetch(url);
  const text = await res.text();
  // Google devuelve /*O_o*/  google.visualization.Query.setResponse({...});
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table.rows;

  // Fila 0 = encabezados: Código Activo, Tipo Activo, Marca, Modelo, ..., Estado, ID, Responsable, Departamento, Observaciones
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const cod = r.c[0]?.v;
    if (!cod) continue;
    if (cod.trim().toUpperCase() === codigo.trim().toUpperCase()) {
      return {
        _row:         i + 2, // +1 header +1 base-1
        codigo:       cod,
        tipo:         r.c[1]?.v || '',
        marca:        r.c[2]?.v || '',
        modelo:       r.c[3]?.v || '',
        estado:       r.c[6]?.v || '',
        id:           r.c[7]?.v || '',
        responsable:  r.c[8]?.v || '',
        departamento: r.c[9]?.v || '',
        observaciones:r.c[10]?.v || '',
      };
    }
  }
  return null;
}

async function main() {
  const id = getParam('id');
  if (!id) {
    renderError('Escanea el QR de un activo para ver su ficha.');
    return;
  }
  renderLoading();
  try {
    const asset = await loadAsset(id);
    if (asset) renderAsset(asset);
    else renderError(`No se encontró el activo <strong>${id}</strong> en el inventario.`);
  } catch(e) {
    renderError('No se pudo conectar al inventario. Verifica tu conexión a internet.');
  }
}

main();
</script>
</body>
</html>
